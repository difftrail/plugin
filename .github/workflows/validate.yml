name: Validate

on:
  pull_request:
    branches: [main]

jobs:
  manifests:
    name: Manifest consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: node --test scripts/
      - run: node scripts/check-manifests.mjs
