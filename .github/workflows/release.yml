name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Cut release if changesets present
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT (org admin) so the release commit/tag push bypasses main's "require PR"
          # ruleset — the default GITHUB_TOKEN (github-actions app) can't be a bypass actor.
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 24 bundles npm 11, matching the npm that maintains package-lock.json.
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Detect pending changesets
        id: changeset
        run: |
          count=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' 2>/dev/null | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 0 ]; then echo "has=true" >> "$GITHUB_OUTPUT"; else echo "has=false" >> "$GITHUB_OUTPUT"; fi

      - name: Exit if no changesets
        if: steps.changeset.outputs.has == 'false'
        run: echo "No pending changesets — nothing to release"

      - name: Configure git identity
        if: steps.changeset.outputs.has == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version via changeset
        if: steps.changeset.outputs.has == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run version

      - name: Read new version
        if: steps.changeset.outputs.has == 'true'
        id: version
        run: echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Commit, tag, push
        if: steps.changeset.outputs.has == 'true'
        run: |
          git add -A
          git commit -m "chore(release): v${{ steps.version.outputs.version }} [skip ci]"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin main
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        if: steps.changeset.outputs.has == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## v${{ steps.version.outputs.version }}

            See [CHANGELOG.md](./CHANGELOG.md) for the full list of changes.
          draft: false
          prerelease: false
